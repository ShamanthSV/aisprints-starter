# Apply SQL migrations in /migrations to the remote D1 database (production schema).
# Repo secret: CLOUDFLARE_API_TOKEN (Account — D1:Edit or broader Workers deploy token).

name: D1 remote migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations (remote)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run d1:migrate:remote
